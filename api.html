<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
  padding: 20px;
}

/* BACK + CENTER */
.wrapper-all {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* BACK */
.back-btn {
  background: #e2e8f0;
  color: #0f172a;
  padding: 10px 12px;
  border-radius: 12px;
  text-decoration: none;
}

/* CONTENT */
.wrapper {
  width: 380px;
  color: white;
}

.header h1 {
  margin: 0;
}

.header p {
  font-size: 12px;
  color: #94a3b8;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: #1e293b;
  padding: 14px;
  border-radius: 14px;
  text-decoration: none;
  color: white;
}

.card:hover {
  background: #273449;
}

.icon {
  font-size: 22px;
}

.card-title {
  font-weight: 600;
}

.card-desc {
  font-size: 12px;
  color: #94a3b8;
}
</style>

</head>
<body>

<div class="wrapper-all">

  <a href="index.html" class="back-btn">← Back</a>

  <div class="wrapper">

    <div class="header">
      <h1>API Hub</h1>
      <p>Choose service</p>
    </div>

    <div class="cards">

      <a href="api/weather.html" class="card">
        <div class="icon">🌤️</div>
        <div class="card-title">Weather</div>
        <div class="card-desc">Forecast API</div>
      </a>

      <a href="currency.html" class="card">
        <div class="icon">💱</div>
        <div class="card-title">Currency</div>
        <div class="card-desc">Rates API</div>
      </a>

    </div>

  </div>

</div>

</body>
</html>
