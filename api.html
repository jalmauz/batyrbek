<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* NEW WRAPPER FOR BACK BUTTON */
.wrapper-all {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* BACK BUTTON (OUTSIDE UI) */
.back-btn {
  background: #e2e8f0;
  color: #0f172a;
  padding: 10px 12px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 14px;
  height: fit-content;
}

.back-btn:hover {
  background: #cbd5e1;
}

/* WRAPPER */
.wrapper {
  width: 380px;
  color: white;
}

/* HEADER */
.header {
  margin-bottom: 14px;
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

.header p {
  margin: 4px 0 0;
  font-size: 12px;
  color: #94a3b8;
}

/* CARDS */
.cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: #1e293b;
  padding: 14px;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.2s;
  text-decoration: none;
  color: white;
}

.card:hover {
  transform: translateY(-2px);
  background: #273449;
}

.card-title {
  font-size: 16px;
  font-weight: 600;
}

.card-desc {
  font-size: 12px;
  color: #94a3b8;
  margin-top: 4px;
}

.icon {
  font-size: 22px;
  margin-bottom: 6px;
}
</style>

</head>
<body>

<div class="wrapper-all">

  <!-- BACK BUTTON OUTSIDE UI -->
  <a href="index.html" class="back-btn">← Back</a>

  <div class="wrapper">

    <div class="header">
      <h1>API Hub</h1>
      <p>Choose a service</p>
    </div>

    <div class="cards">

      <a href="api/weather.html" class="card">
        <div class="icon">🌤️</div>
        <div class="card-title">Weather</div>
        <div class="card-desc">Live weather forecast API</div>
      </a>

      <a href="currency.html" class="card">
        <div class="icon">💱</div>
        <div class="card-title">Currency</div>
        <div class="card-desc">Exchange rates & converter</div>
      </a>

    </div>

  </div>

</div>

</body>
</html>
