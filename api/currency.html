<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
}

/* WRAPPER */
.wrapper {
  display: flex;
  align-items: center;
  gap: 20px;
}

/* BACK BUTTON */
.back-btn {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  color: white;
  padding: 12px 16px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 600;
}

/* CARD */
.card {
  width: 380px;
  height: 680px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(30px);

  border-radius: 30px;
  padding: 20px;

  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* HEADER */
.header {
  text-align: center;
}

/* BLOCK */
.block {
  background: rgba(255,255,255,0.04);
  border-radius: 20px;
  padding: 14px;
}

.rate {
  display: flex;
  justify-content: space-between;
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
}

.left {
  display: flex;
  gap: 10px;
}

.value {
  color: #38bdf8;
  font-weight: 800;
}

.converter {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.row {
  display: flex;
  gap: 10px;
}

.select {
  width: 90px;
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  text-align: center;
}

.input {
  flex: 1;
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
}

input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: white;
}

.result {
  background: linear-gradient(135deg, #2563eb, #38bdf8);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 📱 MOBILE */
@media (max-width: 480px) {

  body {
    align-items: flex-start;
    padding: 16px;
  }

  .wrapper {
    flex-direction: column;
    align-items: stretch;
    width: 100%;
  }

  .card {
    width: 100%;
    height: auto;
  }

}
</style>
</head>

<body>

<div class="wrapper">

  <a href="../api.html" class="back-btn">← Back</a>

  <div class="card">

    <div class="header">
      <h1>Currency</h1>
      <p>Live exchange dashboard</p>
    </div>

    <div class="block">

      <div class="rate">
        <div class="left">
          <div>$ USD</div>
        </div>
        <div class="value">460 ₸</div>
      </div>

      <div class="rate">
        <div class="left">
          <div>€ EUR</div>
        </div>
        <div class="value">495 ₸</div>
      </div>

      <div class="rate">
        <div class="left">
          <div>₽ RUB</div>
        </div>
        <div class="value">5 ₸</div>
      </div>

    </div>

    <div class="block converter">

      <div class="row">
        <div class="select">USD</div>
        <div class="input">
          <input type="text" placeholder="Enter amount">
        </div>
      </div>

      <div class="row">
        <div class="select">KZT</div>
        <div class="input result">
          0.00
        </div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
