<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
  color: white;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
}

/* WRAPPER */
.wrapper {
  display: flex;
  align-items: center;
  gap: 20px;
}

/* BACK BUTTON */
.back-btn {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  color: white;
  padding: 12px 16px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

.back-btn:hover {
  background: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}

/* CARD */
.card {
  width: 380px;
  height: 680px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(30px);

  border-radius: 30px;
  padding: 20px;

  display: flex;
  flex-direction: column;
  gap: 16px;

  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 30px 80px rgba(0,0,0,0.8);
}

/* HEADER */
.header {
  text-align: center;
}

.header h1 {
  margin: 0;
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 1px;
}

.header p {
  margin-top: 6px;
  font-size: 12px;
  color: #94a3b8;
}

/* BLOCK */
.block {
  background: rgba(255,255,255,0.04);
  border-radius: 20px;
  padding: 14px;
}

/* RATE */
.rate {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 14px;
  margin-bottom: 10px;

  border-radius: 16px;
  background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));

  transition: 0.3s;
}

.rate:hover {
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.rate:last-child {
  margin-bottom: 0;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sym {
  font-size: 20px;
  font-weight: 800;
}

.currency {
  font-size: 16px;
  font-weight: 700;
}

.value {
  font-size: 16px;
  font-weight: 800;
  color: #38bdf8;
}

/* CONVERTER */
.converter {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.select {
  width: 90px;
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  text-align: center;
  font-weight: 700;
}

.input {
  flex: 1;
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
}

input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 14px;
}

.result {
  background: linear-gradient(135deg, #2563eb, #38bdf8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
}
</style>

</head>

<body>

<div class="wrapper">

  <!-- FIXED BACK BUTTON -->
  <a href="../api.html" class="back-btn">← Back</a>

  <div class="card">

    <div class="header">
      <h1>Currency</h1>
      <p>Live exchange dashboard</p>
    </div>

    <div class="block">

      <div class="rate">
        <div class="left">
          <div class="sym">$</div>
          <div class="currency">USD</div>
        </div>
        <div class="value">460 ₸</div>
      </div>

      <div class="rate">
        <div class="left">
          <div class="sym">€</div>
          <div class="currency">EUR</div>
        </div>
        <div class="value">495 ₸</div>
      </div>

      <div class="rate">
        <div class="left">
          <div class="sym">₽</div>
          <div class="currency">RUB</div>
        </div>
        <div class="value">5 ₸</div>
      </div>

    </div>

    <div class="block converter">

      <div class="row">
        <div class="select">USD</div>
        <div class="input">
          <input type="text" placeholder="Enter amount">
        </div>
      </div>

      <div class="row">
        <div class="select">KZT</div>
        <div class="input result">
          0.00
        </div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
