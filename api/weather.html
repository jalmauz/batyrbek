<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather UI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* WRAPPER */
.wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* BACK BUTTON */
.back-btn {
  background: #e2e8f0;
  color: #0f172a;
  padding: 10px 12px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 14px;
  height: fit-content;
}

.back-btn:hover {
  background: #cbd5e1;
}

/* CARD */
.card {
  width: 350px;
  background: #f8fafc;
  border-radius: 22px;
  padding: 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.4);
}

.header {
  text-align: center;
  margin-bottom: 12px;
}

.header h1 {
  margin: 0;
  font-size: 22px;
  color: #0f172a;
}

.header p {
  margin: 6px 0 0;
  font-size: 12px;
  color: #64748b;
}

.city {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #e2e8f0;
  padding: 10px 12px;
  border-radius: 12px;
  margin: 12px 0;
  font-size: 14px;
  color: #0f172a;
}

.city-left {
  display: flex;
  align-items: center;
  gap: 6px;
}

.city-btn {
  font-size: 12px;
  color: #475569;
}

.weather-box {
  background: linear-gradient(135deg, #60a5fa, #2563eb);
  border-radius: 18px;
  padding: 16px;
  color: white;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.temp {
  font-size: 56px;
  font-weight: 700;
  letter-spacing: -2px;
}

.desc {
  font-size: 14px;
  margin-top: 4px;
}

.feels {
  font-size: 12px;
  opacity: 0.8;
}

.weather-icon {
  font-size: 52px;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 14px;
}

.stat {
  font-size: 12px;
  opacity: 0.95;
}

.days {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}

.day {
  flex: 1;
  background: #e2e8f0;
  border-radius: 14px;
  padding: 10px;
  text-align: center;
  position: relative;
}

.day.today {
  background: #dbeafe;
  border: 2px solid #3b82f6;
}

.today-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  font-size: 9px;
  background: #3b82f6;
  color: white;
  padding: 2px 6px;
  border-radius: 8px;
}

.day-name {
  font-size: 12px;
  color: #0f172a;
  opacity: 0.7;
}

.day-temp {
  font-size: 14px;
  font-weight: 700;
  margin-top: 4px;
}

.day-icon {
  font-size: 18px;
}

.footer {
  text-align: center;
  font-size: 11px;
  margin-top: 10px;
  color: #64748b;
}
</style>

</head>
<body>

<div class="wrapper">

  <!-- BACK BUTTON (FIXED) -->
  <a href="../api.html" class="back-btn">← Back</a>

  <div class="card">

    <div class="header">
      <h1>Weather</h1>
      <p>Choose a city and get forecast</p>
    </div>

    <div class="city">
      <div class="city-left">📍 Astana, Kazakhstan</div>
      <div class="city-btn">▼</div>
    </div>

    <div class="weather-box">

      <div class="top">
        <div>
          <div class="temp">-2°</div>
          <div class="desc">Clear Sky</div>
          <div class="feels">Feels like -6°</div>
        </div>

        <div class="weather-icon">☀️</div>
      </div>

      <div class="stats">
        <div class="stat">💧 Humidity 66%</div>
        <div class="stat">🌬️ Wind 8 km/h</div>
      </div>

    </div>

    <div class="days">

      <div class="day">
        <div class="day-icon">🌧️</div>
        <div class="day-name">Mon</div>
        <div class="day-temp">-1°</div>
      </div>

      <div class="day">
        <div class="day-icon">☁️</div>
        <div class="day-name">Tue</div>
        <div class="day-temp">1°</div>
      </div>

      <div class="day today">
        <div class="today-badge">TODAY</div>
        <div class="day-icon">☀️</div>
        <div class="day-name">Wed</div>
        <div class="day-temp">0°</div>
      </div>

      <div class="day">
        <div class="day-icon">🌤️</div>
        <div class="day-name">Thu</div>
        <div class="day-temp">2°</div>
      </div>

      <div class="day">
        <div class="day-icon">🌙</div>
        <div class="day-name">Fri</div>
        <div class="day-temp">1°</div>
      </div>

    </div>

    <div class="footer">
      Updated: 10:30 AM
    </div>

  </div>

</div>

</body>
</html>
