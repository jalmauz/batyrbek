<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
  padding: 20px;
}

.wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
}

.back-btn {
  background: #e2e8f0;
  color: #0f172a;
  padding: 10px 12px;
  border-radius: 12px;
  text-decoration: none;
  font-size: 14px;
}

.card {
  width: 350px;
  background: #f8fafc;
  border-radius: 22px;
  padding: 20px;
}

.header {
  text-align: center;
  margin-bottom: 12px;
}

.header h1 {
  margin: 0;
  font-size: 22px;
  color: #0f172a;
}

.header p {
  font-size: 12px;
  color: #64748b;
}

.city {
  display: flex;
  justify-content: space-between;
  background: #e2e8f0;
  padding: 10px;
  border-radius: 12px;
  margin: 12px 0;
}

.weather-box {
  background: linear-gradient(135deg, #60a5fa, #2563eb);
  border-radius: 18px;
  padding: 16px;
  color: white;
}

.top {
  display: flex;
  justify-content: space-between;
}

.temp {
  font-size: 52px;
}

.weather-icon {
  font-size: 48px;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
}

.days {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}

.day {
  flex: 1;
  background: #e2e8f0;
  border-radius: 14px;
  padding: 10px;
  text-align: center;
}

.day.today {
  background: #dbeafe;
  border: 2px solid #3b82f6;
}

.footer {
  text-align: center;
  font-size: 11px;
  margin-top: 10px;
  color: #64748b;
}

/* 📱 MOBILE */
@media (max-width: 480px) {

  body {
    align-items: flex-start;
    padding: 16px;
  }

  .wrapper {
    flex-direction: column;
    align-items: stretch;
    width: 100%;
    gap: 16px;
  }

  .card {
    width: 100%;
  }

  .temp {
    font-size: 44px;
  }

}
</style>
</head>

<body>

<div class="wrapper">

  <a href="../api.html" class="back-btn">← Back</a>

  <div class="card">

    <div class="header">
      <h1>Weather</h1>
      <p>Live forecast</p>
    </div>

    <div class="city">
      📍 Astana
      <div>▼</div>
    </div>

    <div class="weather-box">
      <div class="top">
        <div>
          <div class="temp">-2°</div>
          <div>Clear Sky</div>
          <div>Feels -6°</div>
        </div>
        <div class="weather-icon">☀️</div>
      </div>

      <div class="stats">
        <div>💧 66%</div>
        <div>🌬️ 8 km/h</div>
      </div>
    </div>

    <div class="days">
      <div class="day">Mon</div>
      <div class="day">Tue</div>
      <div class="day today">Wed</div>
      <div class="day">Thu</div>
      <div class="day">Fri</div>
    </div>

    <div class="footer">
      Updated 10:30
    </div>

  </div>

</div>

</body>
</html>
