<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>My demo site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ede9fe;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 15px 25px;
      width: 200px;
      background: white;
      color: black;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 16px;
    }

    .btn:hover {
      background: #f3f4f6;
      transform: scale(1.03);
    }

    .btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Frontend Practice / Web Experiments</h1>

    <div class="btn">HTML + CSS</div>
    <div class="btn">JavaScript</div>
    <div class="btn">API</div>
  </div>
</body>
</html>
