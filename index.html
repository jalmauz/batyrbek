<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Demo Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    .btn {
      display: block;
      margin: 10px;
      padding: 15px;
      background: #222;
      border: 1px solid #444;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Web Practice</h1>

    <div class="btn">HTML + CSS</div>
    <div class="btn">JavaScript</div>
    <div class="btn">API</div>
  </div>
</body>
</html>
